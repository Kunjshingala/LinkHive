name: link_hive
description: "A new Flutter project."

version: 1.0.1+1

environment:
  sdk: ^3.10.1
  flutter: 3.38.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Routing & State
  go_router: any
  flutter_bloc: any
  equatable: any
  rxdart: any
  get_it: any
  intl: any

  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  google_sign_in: any

  # Local Storage
  hive_flutter: any

  # Networking & Media
  receive_sharing_intent: any
  cached_network_image: any
  http: any
  internet_connection_checker_plus: any
  uuid: any

  # UI
  flutter_svg: any
  font_awesome_flutter: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  hive_generator: any
  build_runner: any
  mocktail: ^1.0.4
  hive_test: ^1.0.1
  bloc_test: any

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
